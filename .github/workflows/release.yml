name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build parsers
        run: ./peg

      - name: Run tests
        run: bun run test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
          - bun-windows-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build parsers
        run: ./peg

      - name: Compile Executable
        run: |
          OUTFILE="au-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            OUTFILE="${OUTFILE}.exe"
          fi
          bun build ./src/main.ts --compile --target=${{ matrix.target }} --outfile=$OUTFILE

      - name: Smoke test --help
        if: matrix.target == 'bun-linux-x64'
        run: |
          output=$(./au-bun-linux-x64 --help)
          echo "$output"
          echo "$output" | grep -q "USAGE"

      - name: Smoke test compilation
        if: matrix.target == 'bun-linux-x64'
        run: ./au-bun-linux-x64 -C test-language/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: au-*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Prepare Release Assets
        run: |
          mkdir dist
          mv artifacts/*/* dist/
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
